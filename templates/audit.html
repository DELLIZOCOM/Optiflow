<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiFlow AI — Audit Log</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left h1 { font-size: 20px; font-weight: 600; }
    .header-left p  { font-size: 13px; color: #8a8fb5; margin-top: 2px; }

    .btn-back {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-back:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    #search-input {
      flex: 1;
      min-width: 220px;
      padding: 9px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
    }
    #search-input:focus { border-color: #1a1a2e; }

    .date-filters { display: flex; gap: 6px; }
    .date-filters button {
      padding: 8px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 7px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .date-filters button:hover  { background: #f5f5f5; border-color: #bbb; }
    .date-filters button.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

    /* ── Table ── */
    .page {
      flex: 1;
      padding: 28px 32px;
      max-width: 1300px;
      margin: 0 auto;
      width: 100%;
    }

    .table-wrap {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      background: #f7f8fa;
      text-align: left;
      padding: 11px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #e8e8e8;
    }
    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbff; }
    td { padding: 10px 16px; color: #333; vertical-align: middle; }

    .col-ts   { white-space: nowrap; color: #888; font-size: 12.5px; font-family: monospace; width: 160px; }
    .col-user { font-weight: 600; color: #1a1a2e; width: 110px; }
    .col-act  { width: 160px; }
    .col-sum  { color: #555; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-green  { background: #d3f9d8; color: #2b8a3e; }
    .badge-red    { background: #ffe3e3; color: #c92a2a; }
    .badge-gray   { background: #f1f3f5; color: #666; }
    .badge-blue   { background: #dbe4ff; color: #364fc7; }
    .badge-indigo { background: #e5dbff; color: #5f3dc4; }
    .badge-orange { background: #fff3bf; color: #966a00; }
    .badge-teal   { background: #c3fae8; color: #087f5b; }
    .badge-dark   { background: #e9ecef; color: #343a40; }

    /* ── Empty / count ── */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .meta-row h2 { font-size: 17px; font-weight: 700; color: #1a1a2e; }
    .entry-count { font-size: 13px; color: #888; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #aaa;
      font-size: 14px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

    @media (max-width: 700px) {
      .page { padding: 16px; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>OptiFlow AI</h1>
      <p>Audit Log</p>
    </div>
    <a href="/" class="btn-back">← Back to Chat</a>
  </div>

  <div class="page">
    <div class="meta-row">
      <h2>Audit Log</h2>
      <span class="entry-count" id="entry-count"></span>
    </div>

    <div class="controls">
      <input type="text" id="search-input" placeholder="Search by user, action, or summary…">
      <div class="date-filters">
        <button data-range="all" class="active">All time</button>
        <button data-range="7d">Last 7 days</button>
        <button data-range="today">Today</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-ts">Timestamp</th>
            <th class="col-user">User</th>
            <th class="col-act">Action</th>
            <th class="col-sum">Summary</th>
          </tr>
        </thead>
        <tbody id="audit-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="icon">📋</div>
        No audit entries match your filter.
      </div>
    </div>
  </div>

  <script>
// ── Data passed from server ──────────────────────────────────────────────────
const ENTRIES = {{ entries | tojson }};

// ── Badge config ─────────────────────────────────────────────────────────────
const ACTION_META = {
  login:                  { label: "Login",            cls: "badge-green"  },
  login_failed:           { label: "Login Failed",     cls: "badge-red"    },
  logout:                 { label: "Logout",            cls: "badge-gray"   },
  query_template:         { label: "Template Query",   cls: "badge-dark"   },
  query_agent_generated:  { label: "Agent Generated",  cls: "badge-blue"   },
  query_agent_approved:   { label: "Agent Approved",   cls: "badge-teal"   },
  query_agent_rejected:   { label: "Agent Rejected",   cls: "badge-red"    },
  query_agent_cached:     { label: "Cache Hit",        cls: "badge-blue"   },
  query_deep_dive:        { label: "Deep Dive",        cls: "badge-indigo" },
  query_chain:            { label: "Chain Query",      cls: "badge-indigo" },
  query_failed:           { label: "Query Failed",     cls: "badge-red"    },
  setup_completed:        { label: "Setup",            cls: "badge-orange" },
};

function actionBadge(action) {
  const m = ACTION_META[action] || { label: action, cls: "badge-gray" };
  return `<span class="badge ${m.cls}">${escHtml(m.label)}</span>`;
}

// ── Summary builders ─────────────────────────────────────────────────────────
function summary(entry) {
  const d = entry.details || {};
  const q = (d.question || "").slice(0, 70);
  switch (entry.action) {
    case "login":
      return d.success
        ? `Successful login from ${d.ip || "unknown IP"}`
        : `Failed login from ${d.ip || "unknown IP"}`;
    case "login_failed":
      return `Failed attempt for '${escHtml(entry.username)}' from ${d.ip || "unknown IP"}`;
    case "logout":
      return "Logged out";
    case "query_template":
      return `${d.intent || "unknown intent"} · ${d.rows_returned ?? "?"} rows · ${d.response_time_ms ?? "?"}ms`;
    case "query_agent_generated": {
      const tables = (d.tables_used || []).join(", ") || "unknown tables";
      return `${escHtml(q)} — tables: ${escHtml(tables)}`;
    }
    case "query_agent_approved":
      return `${d.rows_returned ?? "?"} rows · ${d.execution_time_ms ?? "?"}ms`;
    case "query_agent_rejected":
      return `Rejected: ${escHtml(q)}`;
    case "query_agent_cached":
      return `Cache hit: ${escHtml(q)}`;
    case "query_deep_dive":
      return `${escHtml(d.entity_type || "")} — ${escHtml(d.entity_label || d.question?.slice(0, 60) || "")}`;
    case "query_chain":
      return `${d.steps_count ?? "?"} steps · ${d.total_rows ?? "?"} rows · ${d.total_time_ms ?? "?"}ms`;
    case "query_failed":
      return `Error: ${escHtml((d.error || "").slice(0, 80))}`;
    case "setup_completed":
      return `${d.tables_discovered ?? "?"} tables · db: ${escHtml(d.database || "?")}`;
    default:
      return escHtml(JSON.stringify(d).slice(0, 100));
  }
}

// ── Filtering ────────────────────────────────────────────────────────────────
let activeRange = "all";

function matchesDate(entry) {
  if (activeRange === "all") return true;
  const ts  = new Date(entry.timestamp + "Z");
  const now = new Date();
  if (activeRange === "today") {
    return ts.toDateString() === now.toDateString();
  }
  if (activeRange === "7d") {
    return (now - ts) <= 7 * 24 * 3600 * 1000;
  }
  return true;
}

function matchesSearch(entry, needle) {
  if (!needle) return true;
  const hay = [
    entry.username,
    entry.action,
    ACTION_META[entry.action]?.label || "",
    summary(entry),
  ].join(" ").toLowerCase();
  return hay.includes(needle);
}

function getFiltered() {
  const needle = document.getElementById("search-input").value.trim().toLowerCase();
  return ENTRIES.filter(e => matchesDate(e) && matchesSearch(e, needle));
}

// ── Rendering ────────────────────────────────────────────────────────────────
function render() {
  const entries   = getFiltered();
  const tbody     = document.getElementById("audit-body");
  const emptyEl   = document.getElementById("empty-state");
  const countEl   = document.getElementById("entry-count");

  countEl.textContent = `${entries.length} entr${entries.length === 1 ? "y" : "ies"}`;

  if (entries.length === 0) {
    tbody.innerHTML = "";
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";

  tbody.innerHTML = entries.map(e => `
    <tr>
      <td class="col-ts">${escHtml(e.timestamp.replace("T", " "))}</td>
      <td class="col-user">${escHtml(e.username)}</td>
      <td class="col-act">${actionBadge(e.action)}</td>
      <td class="col-sum">${summary(e)}</td>
    </tr>
  `).join("");
}

function escHtml(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ── Event wiring ─────────────────────────────────────────────────────────────
document.getElementById("search-input").addEventListener("input", render);

document.querySelectorAll(".date-filters button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".date-filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeRange = btn.dataset.range;
    render();
  });
});

render();
  </script>

</body>
</html>
