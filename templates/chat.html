<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiFlow AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 24px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p  { font-size: 13px; color: #8a8fb5; margin-top: 2px; }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg { max-width: 75%; animation: fadeIn 0.2s ease; }

  .msg-ai {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px 12px 12px 2px;
    padding: 14px 18px;
  }

  .msg-user {
    align-self: flex-end;
    background: #1a1a2e;
    color: #fff;
    border-radius: 12px 12px 2px 12px;
    padding: 14px 18px;
  }

  .msg-text {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg-meta {
    font-size: 11px;
    color: #999;
    margin-top: 6px;
  }

  .msg-user .msg-meta { color: #8a8fb5; }

  /* ── Loading ── */
  .loading {
    align-self: flex-start;
    display: flex;
    gap: 6px;
    padding: 14px 18px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px 12px 12px 2px;
  }
  .loading span {
    width: 8px; height: 8px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Chips ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 24px 4px;
    flex-shrink: 0;
  }
  .chip {
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    color: #333;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .chip:hover {
    background: #1a1a2e;
    color: #fff;
    border-color: #1a1a2e;
  }

  /* ── Input bar ── */
  .input-bar {
    display: flex;
    gap: 10px;
    padding: 12px 24px 20px;
    background: #f0f2f5;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #d0d0d0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-bar input:focus { border-color: #1a1a2e; }

  .input-bar button {
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .input-bar button:hover { background: #16213e; }
  .input-bar button:disabled { background: #999; cursor: not-allowed; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .msg { max-width: 90%; }
    .header { padding: 14px 16px; }
    .chat-area { padding: 16px; }
    .chips { padding: 10px 16px 4px; }
    .input-bar { padding: 10px 16px 16px; }
    .input-bar button { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>OptiFlow AI</h1>
  <p>BizFlow ERP Intelligence</p>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg msg-ai">
    <div class="msg-text">Hello! I can help you with BizFlow data — projects, invoices, AMC contracts, operations, and tickets. Ask me anything or pick a question below.</div>
  </div>
</div>

<div class="chips" id="chips">
  <div class="chip" onclick="sendQuestion('Pipeline breakdown?')">Pipeline breakdown?</div>
  <div class="chip" onclick="sendQuestion('Pending invoices?')">Pending invoices?</div>
  <div class="chip" onclick="sendQuestion('AMC expiring soon?')">AMC expiring soon?</div>
  <div class="chip" onclick="sendQuestion('Active operations?')">Active operations?</div>
  <div class="chip" onclick="sendQuestion('Open tickets?')">Open tickets?</div>
</div>

<div class="input-bar">
  <input type="text" id="questionInput" placeholder="Ask about projects, invoices, AMC, operations, or tickets..."
         onkeydown="if(event.key==='Enter') sendFromInput()">
  <button id="sendBtn" onclick="sendFromInput()">Send</button>
</div>

<script>
const chatArea  = document.getElementById('chatArea');
const input     = document.getElementById('questionInput');
const sendBtn   = document.getElementById('sendBtn');
const chipsDiv  = document.getElementById('chips');
let busy = false;

function addMessage(text, type, meta) {
  const msg = document.createElement('div');
  msg.className = 'msg msg-' + type;
  const t = document.createElement('div');
  t.className = 'msg-text';
  t.textContent = text;
  msg.appendChild(t);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = meta;
    msg.appendChild(m);
  }
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function showLoading() {
  const el = document.createElement('div');
  el.className = 'loading';
  el.id = 'loader';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loader');
  if (el) el.remove();
}

function setDisabled(disabled) {
  busy = disabled;
  sendBtn.disabled = disabled;
  input.disabled = disabled;
}

async function sendQuestion(question) {
  if (busy || !question.trim()) return;

  // Hide chips after first use
  chipsDiv.style.display = 'none';

  addMessage(question, 'user');
  input.value = '';
  setDisabled(true);
  showLoading();

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: question })
    });
    const data = await res.json();
    hideLoading();

    const meta = data.time_ms != null
      ? (data.intent ? data.intent + ' · ' : '') + data.time_ms + 'ms'
      : '';
    addMessage(data.answer, 'ai', meta);
  } catch (err) {
    hideLoading();
    addMessage('Something went wrong. Please try again.', 'ai');
  }

  setDisabled(false);
  input.focus();
}

function sendFromInput() {
  sendQuestion(input.value);
}

input.focus();
</script>
</body>
</html>
