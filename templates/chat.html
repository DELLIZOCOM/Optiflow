<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiFlow AI Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f1f5f9;
      --bg-chat: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e2e8f0;
      --ai-msg: #f8fafc;
      --user-msg: #2563eb;
      --user-text: #ffffff;
      --header-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      max-width: 1100px;
      background-color: var(--bg-chat);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    @media (min-width: 768px) {
      .app-container {
        height: 94vh;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      padding: 20px 24px;
      background-color: var(--header-bg);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      flex-shrink: 0;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background-color: var(--primary);
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Chat Area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chat-area::-webkit-scrollbar {
      width: 8px;
    }

    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .chat-area::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .msg {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-ai {
      align-self: flex-start;
    }

    .msg-user {
      align-self: flex-end;
    }

    .msg-bubble {
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg-ai .msg-bubble {
      background-color: var(--ai-msg);
      color: var(--text-main);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }

    .msg-user .msg-bubble {
      background-color: var(--user-msg);
      color: var(--user-text);
      border-bottom-right-radius: 2px;
    }

    .msg-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    .msg-user .msg-meta {
      text-align: right;
    }

    /* ── Loading ── */
    .loading .msg-bubble {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 16px 20px;
      min-height: 54px;
    }

    .loading span {
      width: 6px;
      height: 6px;
      background-color: var(--text-muted);
      border-radius: 50%;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .loading span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* ── Chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 16px;
      flex-shrink: 0;
    }

    .chip {
      padding: 8px 16px;
      background-color: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      background-color: var(--ai-msg);
      border-color: #cbd5e1;
    }

    /* ── Input Bar ── */
    .input-bar {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background-color: var(--bg-chat);
      flex-shrink: 0;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
    }

    .input-bar input {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-main);
      background-color: #ffffff;
      transition: border-color 0.2s;
    }

    .input-bar input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .input-bar button {
      padding: 0 24px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .input-bar button:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .input-bar button:disabled {
      background-color: #cbd5e1;
      cursor: not-allowed;
    }

    .input-bar button svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    @media (max-width: 768px) {
      .msg {
        max-width: 92%;
      }

      .header {
        padding: 16px 20px;
      }

      .chat-area {
        padding: 20px;
        gap: 16px;
      }

      .input-bar {
        padding: 16px 20px 20px;
      }

      .chips {
        padding: 0 20px 12px;
      }

      .input-wrapper {
        flex-direction: column;
      }

      .input-bar button {
        padding: 14px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <div class="app-container">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
          </path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <div class="header-text">
        <h1>OptiFlow AI Dashboard</h1>
        <p>BizFlow ERP Intelligence System</p>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
    </div>

    <div class="chips" id="chips">
      <div class="chip" onclick="sendQuestion('How is the business doing?')">Business overview</div>
      <div class="chip" onclick="sendQuestion('Pipeline breakdown?')">Pipeline breakdown</div>
      <div class="chip" onclick="sendQuestion('Pending invoices?')">Pending invoices</div>
      <div class="chip" onclick="sendQuestion('AMC expiring soon?')">AMC expiring soon</div>
      <div class="chip" onclick="sendQuestion('Active operations?')">Active operations</div>
      <div class="chip" onclick="sendQuestion('Open tickets?')">Open tickets</div>
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <input type="text" id="questionInput" placeholder="Ask about projects, invoices, AMC, operations, or tickets..."
          onkeydown="if(event.key==='Enter') sendFromInput()" autocomplete="off">
        <button id="sendBtn" onclick="sendFromInput()">
          <span>Send</span>
          <svg viewBox="0 0 24 24">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" fill="none" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const input = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const chipsDiv = document.getElementById('chips');
    let busy = false;

    function addMessage(text, type, meta) {
      const msg = document.createElement('div');
      msg.className = 'msg msg-' + type;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      msg.appendChild(bubble);

      if (meta) {
        const m = document.createElement('div');
        m.className = 'msg-meta';
        m.textContent = meta;
        msg.appendChild(m);
      }
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }

    function showLoading() {
      const el = document.createElement('div');
      el.className = 'msg msg-ai loading';
      el.id = 'loader';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      el.appendChild(bubble);

      chatArea.appendChild(el);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideLoading() {
      const el = document.getElementById('loader');
      if (el) el.remove();
    }

    function setDisabled(disabled) {
      busy = disabled;
      sendBtn.disabled = disabled;
      input.disabled = disabled;
    }

    async function sendQuestion(question) {
      if (busy || !question.trim()) return;

      // Hide chips after first use
      chipsDiv.style.display = 'none';

      addMessage(question, 'user');
      input.value = '';
      setDisabled(true);
      showLoading();

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question })
        });
        const data = await res.json();
        hideLoading();

        const meta = data.time_ms != null
          ? (data.intent ? data.intent + ' · ' : '') + data.time_ms + 'ms'
          : '';
        addMessage(data.answer, 'ai', meta);
      } catch (err) {
        hideLoading();
        addMessage('An error occurred while connecting to the server. Please try again.', 'ai');
      }

      setDisabled(false);
      input.focus();
    }

    function sendFromInput() {
      sendQuestion(input.value);
    }

    // Fetch welcome message on page load
    (async function loadWelcome() {
      showLoading();
      try {
        const res = await fetch('/welcome');
        const data = await res.json();
        hideLoading();
        const meta = data.time_ms != null ? data.time_ms + 'ms' : '';
        addMessage(data.message, 'ai', meta);
      } catch (err) {
        hideLoading();
        addMessage(
          'Hello! I can help you with BizFlow data. Ask me about projects, invoices, AMC contracts, operations, or tickets.',
          'ai'
        );
      }
      input.focus();
    })();
  </script>
</body>

</html>
