<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiFlow AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .header p {
      font-size: 13px;
      color: #8a8fb5;
      margin-top: 2px;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }

    .msg-ai {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px 12px 12px 2px;
      padding: 14px 18px;
    }

    .msg-user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-radius: 12px 12px 2px 12px;
      padding: 14px 18px;
    }

    .msg-text {
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .msg-user .msg-text {
      white-space: pre-wrap;
    }

    .msg-meta {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    .msg-user .msg-meta {
      color: #8a8fb5;
    }

    /* ── Loading ── */
    .loading {
      align-self: flex-start;
      display: flex;
      gap: 6px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px 12px 12px 2px;
    }

    .loading span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .loading span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-8px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 24px 4px;
      flex-shrink: 0;
    }

    .chip {
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chip:hover {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 12px 24px 20px;
      background: #f0f2f5;
      flex-shrink: 0;
    }

    .input-bar input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d0d0d0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-bar input:focus {
      border-color: #1a1a2e;
    }

    .input-bar button {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .input-bar button:hover {
      background: #16213e;
    }

    .input-bar button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    /* ── Agent preview card ── */
    .msg-agent-preview {
      max-width: 88%;
      align-self: flex-start;
      background: #fff;
      border: 1.5px solid #3b5bdb;
      border-radius: 12px 12px 12px 2px;
      padding: 16px 18px;
      animation: fadeIn 0.2s ease;
    }

    .agent-header {
      font-size: 11px;
      font-weight: 700;
      color: #3b5bdb;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .agent-explanation {
      font-size: 14px;
      color: #333;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .agent-meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .table-tag {
      background: #e8eaf6;
      color: #3b5bdb;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .conf-badge {
      font-size: 11px;
      font-weight: 700;
      border-radius: 4px;
      padding: 3px 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-left: auto;
    }
    .conf-high   { background: #d3f9d8; color: #2b8a3e; }
    .conf-medium { background: #fff3bf; color: #966a00; }
    .conf-low    { background: #ffe3e3; color: #c92a2a; }
    .conf-none   { background: #e9ecef; color: #495057; }

    .sql-block {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.65;
      overflow-x: auto;
      white-space: pre;
      margin-bottom: 12px;
      border: 1px solid #313244;
    }

    .agent-warnings { margin-bottom: 12px; }

    .agent-warning {
      font-size: 12px;
      color: #e67700;
      padding: 2px 0;
    }

    .agent-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      margin-bottom: 6px;
    }

    .btn-approve {
      background: #2b8a3e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-approve:hover { background: #1e7e34; }

    .btn-reject {
      background: #fff;
      color: #c92a2a;
      border: 1.5px solid #c92a2a;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-reject:hover { background: #ffe3e3; }

    .agent-running {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #555;
      font-size: 13px;
      padding: 4px 0;
    }
    .agent-running span {
      width: 7px;
      height: 7px;
      background: #3b5bdb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .agent-running span:nth-child(2) { animation-delay: 0.2s; }
    .agent-running span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Chain card ── */
    .msg-chain-preview {
      max-width: 88%;
      align-self: flex-start;
      background: #fff;
      border: 1.5px solid #0ca678;
      border-radius: 12px 12px 12px 2px;
      padding: 16px 18px;
      animation: fadeIn 0.2s ease;
    }

    .chain-header {
      font-size: 11px;
      font-weight: 700;
      color: #0ca678;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .chain-step {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }

    .chain-step-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .chain-step-num {
      background: #0ca678;
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .chain-step-label {
      font-size: 13px;
      color: #333;
      font-weight: 500;
    }

    .step-tables {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    /* ── Deep dive card ── */
    .msg-deepdive-preview {
      max-width: 88%;
      align-self: flex-start;
      background: #fff;
      border: 1.5px solid #7048e8;
      border-radius: 12px 12px 12px 2px;
      padding: 16px 18px;
      animation: fadeIn 0.2s ease;
    }

    .deepdive-header {
      font-size: 11px;
      font-weight: 700;
      color: #7048e8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .deepdive-entity-label {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .deepdive-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .deepdive-step:last-of-type { border-bottom: none; }

    .deepdive-step-num {
      background: #7048e8;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .deepdive-step-body { flex: 1; }

    .deepdive-step-label {
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .msg, .msg-agent-preview {
        max-width: 95%;
      }

      .header {
        padding: 14px 16px;
      }

      .chat-area {
        padding: 16px;
      }

      .chips {
        padding: 10px 16px 4px;
      }

      .input-bar {
        padding: 10px 16px 16px;
      }

      .input-bar button {
        padding: 12px 16px;
      }

      .sql-block {
        font-size: 11.5px;
      }
    }
    /* ── Markdown rendering (AI messages only) ── */
    .msg-ai .msg-text p {
      margin-bottom: 12px;
    }
    .msg-ai .msg-text p:last-child {
      margin-bottom: 0;
    }
    .msg-ai .msg-text strong {
      font-weight: 600;
    }
    .msg-ai .msg-text em {
      font-style: italic;
    }
    .msg-ai .msg-text ul,
    .msg-ai .msg-text ol {
      padding-left: 20px;
      margin-bottom: 8px;
    }
    .msg-ai .msg-text li {
      margin-bottom: 4px;
    }
    .msg-ai .msg-text pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      margin-bottom: 12px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.65;
    }
    .msg-ai .msg-text pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
      color: inherit;
    }
    .msg-ai .msg-text code {
      background: #f0f0f0;
      color: #d63384;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
    }
    .msg-ai .msg-text h1,
    .msg-ai .msg-text h2,
    .msg-ai .msg-text h3 {
      font-weight: 600;
      margin-top: 16px;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .msg-ai .msg-text h1 { font-size: 17px; }
    .msg-ai .msg-text h2 { font-size: 15px; }
    .msg-ai .msg-text h3 { font-size: 14px; }
    .msg-ai .msg-text hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 12px 0;
    }
    .msg-ai .msg-text table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .msg-ai .msg-text th,
    .msg-ai .msg-text td {
      border: 1px solid #e0e0e0;
      padding: 6px 10px;
      text-align: left;
    }
    .msg-ai .msg-text th {
      background: #f5f5f5;
      font-weight: 600;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
</head>

<body>

  <div class="header">
    <h1>OptiFlow AI</h1>
    <p>BizFlow ERP Intelligence</p>
  </div>

  <div class="chat-area" id="chatArea">
  </div>

  <div class="chips" id="chips">
    <div class="chip" onclick="sendQuestion('How is the business doing?')">Business overview</div>
    <div class="chip" onclick="sendQuestion('Pipeline breakdown?')">Pipeline breakdown?</div>
    <div class="chip" onclick="sendQuestion('Pending invoices?')">Pending invoices?</div>
    <div class="chip" onclick="sendQuestion('AMC expiring soon?')">AMC expiring soon?</div>
    <div class="chip" onclick="sendQuestion('Active operations?')">Active operations?</div>
    <div class="chip" onclick="sendQuestion('Open tickets?')">Open tickets?</div>
  </div>

  <div class="input-bar">
    <input type="text" id="questionInput" placeholder="Ask about projects, invoices, AMC, operations, or tickets..."
      onkeydown="if(event.key==='Enter') sendFromInput()">
    <button id="sendBtn" onclick="sendFromInput()">Send</button>
  </div>

  <script>
const chatArea = document.getElementById('chatArea');
const input    = document.getElementById('questionInput');
const sendBtn  = document.getElementById('sendBtn');
const chipsDiv = document.getElementById('chips');
let busy = false;

// Pending queries keyed by card ID
const pendingQueries = {};
let agentCardCounter = 0;

// ── Helpers ────────────────────────────────────────────────────────────────

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function setDisabled(disabled) {
  busy = disabled;
  sendBtn.disabled = disabled;
  input.disabled = disabled;
}

function showLoading() {
  const el = document.createElement('div');
  el.className = 'loading';
  el.id = 'loader';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loader');
  if (el) el.remove();
}

function addMessage(text, type, meta) {
  const msg = document.createElement('div');
  msg.className = 'msg msg-' + type;
  const t = document.createElement('div');
  t.className = 'msg-text';
  if (type === 'ai') {
    t.innerHTML = marked.parse(text || '');
  } else {
    t.textContent = text;
  }
  msg.appendChild(t);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = meta;
    msg.appendChild(m);
  }
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

const CONF_LABEL = {
  high: 'High confidence', medium: 'Medium confidence',
  low: 'Low confidence', none: 'Unknown'
};

function tagsHtml(tables) {
  return (tables || []).map(t => `<span class="table-tag">${escHtml(t)}</span>`).join('');
}

// ── Single-SQL agent card ───────────────────────────────────────────────────

function addAgentCard(question, data) {
  const cardId = 'agent-card-' + (agentCardCounter++);
  pendingQueries[cardId] = {
    agent_type:  'single',
    question,
    sql:         data.sql,
    tables_used: data.tables_used || [],
  };

  const conf      = data.confidence || 'none';
  const confLabel = CONF_LABEL[conf] || conf;
  const warningsHtml = (data.warnings || [])
    .map(w => `<div class="agent-warning">⚠ ${escHtml(w)}</div>`).join('');

  const card = document.createElement('div');
  card.className = 'msg-agent-preview';
  card.id = cardId;
  card.innerHTML = `
    <div class="agent-header">🤖 Agent Mode — Review before running</div>
    <div class="agent-explanation">${escHtml(data.explanation)}</div>
    <div class="agent-meta-row">
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${tagsHtml(data.tables_used)}</div>
      <span class="conf-badge conf-${escHtml(conf)}">${escHtml(confLabel)}</span>
    </div>
    <pre class="sql-block">${escHtml(data.sql)}</pre>
    ${warningsHtml ? `<div class="agent-warnings">${warningsHtml}</div>` : ''}
    <div class="agent-actions" id="${cardId}-actions">
      <button class="btn-approve" onclick="approveQuery('${cardId}')">✓ Approve &amp; Run</button>
      <button class="btn-reject"  onclick="rejectQuery('${cardId}')">✗ Reject</button>
    </div>
    <div class="msg-meta">🤖 Agent · ${data.time_ms}ms</div>
  `;
  chatArea.appendChild(card);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Chain card (multi-step) ─────────────────────────────────────────────────

function addChainCard(question, data) {
  const cardId = 'agent-card-' + (agentCardCounter++);
  pendingQueries[cardId] = {
    agent_type:     'chain',
    question,
    steps:          data.steps || [],
    summary_prompt: data.summary_prompt || '',
    entity_label:   '',
  };

  const conf      = data.confidence || 'none';
  const confLabel = CONF_LABEL[conf] || conf;
  const n         = (data.steps || []).length;

  const stepsHtml = (data.steps || []).map(s => `
    <div class="chain-step">
      <div class="chain-step-header">
        <div class="chain-step-num">${s.step}</div>
        <div class="chain-step-label">${escHtml(s.explanation)}</div>
      </div>
      <pre class="sql-block" style="margin-bottom:6px;">${escHtml(s.sql)}</pre>
      <div class="step-tables">${tagsHtml(s.tables)}</div>
    </div>
  `).join('');

  const warningsHtml = (data.warnings || [])
    .map(w => `<div class="agent-warning">⚠ ${escHtml(w)}</div>`).join('');

  const card = document.createElement('div');
  card.className = 'msg-chain-preview';
  card.id = cardId;
  card.innerHTML = `
    <div class="chain-header">🔗 Chain Query — ${n}-step investigation</div>
    <div class="agent-explanation" style="margin-bottom:12px;">
      This answer requires ${n} queries run in sequence. Review all steps below.
    </div>
    ${stepsHtml}
    ${warningsHtml ? `<div class="agent-warnings">${warningsHtml}</div>` : ''}
    <div class="agent-meta-row" style="margin-bottom:10px;">
      <span class="conf-badge conf-${escHtml(conf)}">${escHtml(confLabel)}</span>
    </div>
    <div class="agent-actions" id="${cardId}-actions">
      <button class="btn-approve" onclick="approveChain('${cardId}')">✓ Approve &amp; Run All</button>
      <button class="btn-reject"  onclick="rejectQuery('${cardId}')">✗ Reject</button>
    </div>
    <div class="msg-meta">🔗 Chain · ${n} steps · ${data.time_ms}ms</div>
  `;
  chatArea.appendChild(card);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Deep dive card ──────────────────────────────────────────────────────────

function addDeepDiveCard(question, data) {
  const cardId = 'agent-card-' + (agentCardCounter++);
  pendingQueries[cardId] = {
    agent_type:     'deep_dive',
    question,
    steps:          data.steps || [],
    summary_prompt: data.summary_prompt || '',
    entity_label:   data.entity_label || '',
  };

  const entityIcon = data.entity_type === 'project' ? '📋' : '🏢';
  const n          = (data.steps || []).length;

  const stepsHtml = (data.steps || []).map(s => `
    <div class="deepdive-step">
      <div class="deepdive-step-num">${s.step}</div>
      <div class="deepdive-step-body">
        <div class="deepdive-step-label">${escHtml(s.explanation)}</div>
        <div class="step-tables">${tagsHtml(s.tables)}</div>
      </div>
    </div>
  `).join('');

  const card = document.createElement('div');
  card.className = 'msg-deepdive-preview';
  card.id = cardId;
  card.innerHTML = `
    <div class="deepdive-header">${entityIcon} Deep Dive — ${escHtml(data.entity_type || '')}</div>
    <div class="deepdive-entity-label">${escHtml(data.entity_label)}</div>
    ${stepsHtml}
    <div class="agent-actions" id="${cardId}-actions" style="margin-top:14px;">
      <button class="btn-approve" onclick="approveChain('${cardId}')">✓ Run Deep Dive</button>
      <button class="btn-reject"  onclick="rejectQuery('${cardId}')">✗ Cancel</button>
    </div>
    <div class="msg-meta">🔍 Deep Dive · ${n} queries · ${data.time_ms}ms</div>
  `;
  chatArea.appendChild(card);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Approve / reject ────────────────────────────────────────────────────────

async function approveQuery(cardId) {
  const pending = pendingQueries[cardId];
  if (!pending) return;

  setDisabled(true);
  const actionsEl = document.getElementById(cardId + '-actions');
  if (actionsEl) {
    actionsEl.innerHTML =
      '<div class="agent-running"><span></span><span></span><span></span> Running query…</div>';
  }

  try {
    const res  = await fetch('/approve', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(pending),
    });
    const data = await res.json();
    const card = document.getElementById(cardId);
    if (card) card.remove();
    const rowWord = data.rows_returned === 1 ? 'row' : 'rows';
    addMessage(data.answer || 'No results.', 'ai',
      `🤖 Agent · ${data.rows_returned} ${rowWord} · ${data.time_ms}ms`);
  } catch (err) {
    const card = document.getElementById(cardId);
    if (card) card.remove();
    addMessage('Something went wrong executing the query. Please try again.', 'ai', '🤖 Agent');
  }

  delete pendingQueries[cardId];
  setDisabled(false);
  input.focus();
}

async function approveChain(cardId) {
  const pending = pendingQueries[cardId];
  if (!pending) return;

  setDisabled(true);

  // Progress cycling messages
  const steps       = pending.steps || [];
  const isDeepDive  = pending.agent_type === 'deep_dive';
  const icon        = isDeepDive ? '🔍' : '🔗';
  const progressMsgs = [
    ...steps.map((s, i) => `Running step ${i + 1} of ${steps.length}: ${s.explanation}…`),
    'Analysing combined results…',
  ];
  let msgIdx = 0;

  const actionsEl = document.getElementById(cardId + '-actions');
  if (actionsEl) {
    actionsEl.innerHTML = `
      <div class="agent-running">
        <span></span><span></span><span></span>
        <span id="${cardId}-progress-text" style="background:none;border-radius:0;width:auto;height:auto;animation:none;">
          ${escHtml(progressMsgs[0])}
        </span>
      </div>`;
  }

  const progressInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % progressMsgs.length;
    const el = document.getElementById(cardId + '-progress-text');
    if (el) el.textContent = progressMsgs[msgIdx];
  }, 3000);

  try {
    const res  = await fetch('/approve', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(pending),
    });
    const data = await res.json();
    clearInterval(progressInterval);

    const card = document.getElementById(cardId);
    if (card) card.remove();

    const totalRows = data.total_rows ?? 0;
    const rowWord   = totalRows === 1 ? 'row' : 'rows';
    addMessage(data.answer || 'No results.', 'ai',
      `${icon} ${isDeepDive ? 'Deep Dive' : 'Chain'} · ${totalRows} ${rowWord} · ${data.time_ms}ms`);
  } catch (err) {
    clearInterval(progressInterval);
    const card = document.getElementById(cardId);
    if (card) card.remove();
    addMessage('Something went wrong executing the queries. Please try again.', 'ai',
      `${icon} ${isDeepDive ? 'Deep Dive' : 'Chain'}`);
  }

  delete pendingQueries[cardId];
  setDisabled(false);
  input.focus();
}

async function rejectQuery(cardId) {
  const pending = pendingQueries[cardId];

  try {
    await fetch('/reject', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        question: pending?.question || '',
        sql:      pending?.sql || (pending?.steps?.[0]?.sql || ''),
      }),
    });
  } catch (_) { /* non-critical */ }

  const card = document.getElementById(cardId);
  if (card) card.remove();

  addMessage(
    'Query rejected.\n\nTry rephrasing your question — for example:\n' +
    '- Be more specific about the time period or customer name\n' +
    '- Ask about a single metric at a time\n' +
    '- Use exact names (e.g. "Hyundai Glovis" instead of "Hyundai")',
    'ai', '🤖 Agent'
  );

  delete pendingQueries[cardId];
  setDisabled(false);
  input.focus();
}

// ── Main send flow ──────────────────────────────────────────────────────────

async function sendQuestion(question) {
  if (busy || !question.trim()) return;

  chipsDiv.style.display = 'none';
  addMessage(question, 'user');
  input.value = '';
  setDisabled(true);
  showLoading();

  try {
    const res  = await fetch('/ask', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ question }),
    });
    const data = await res.json();
    hideLoading();

    if (data.mode === 'deep_dive') {
      if (!(data.steps || []).length) {
        addMessage(
          data.warnings?.[0] || "I couldn't identify the entity to look up.",
          'ai', '🔍 Deep Dive · ' + data.time_ms + 'ms'
        );
        setDisabled(false);
      } else {
        addDeepDiveCard(question, data);
        // setDisabled released by approveChain / rejectQuery
      }

    } else if (data.mode === 'chain') {
      if (!(data.steps || []).length) {
        addMessage(
          data.warnings?.[0] || "I couldn't build a query for that question.",
          'ai', '🔗 Chain · ' + data.time_ms + 'ms'
        );
        setDisabled(false);
      } else {
        addChainCard(question, data);
      }

    } else if (data.mode === 'agent') {
      if (!data.sql) {
        addMessage(
          data.explanation || "I couldn't find an answer to that question in this database.",
          'ai', '🤖 Agent · ' + data.time_ms + 'ms'
        );
        setDisabled(false);
      } else {
        addAgentCard(question, data);
      }

    } else {
      // Template mode
      const intent = data.intent ? data.intent + ' · ' : '';
      addMessage(data.answer, 'ai', `⚡ Template · ${intent}${data.time_ms}ms`);
      setDisabled(false);
    }

  } catch (err) {
    hideLoading();
    addMessage('Something went wrong. Please try again.', 'ai');
    setDisabled(false);
  }

  input.focus();
}

function sendFromInput() {
  sendQuestion(input.value);
}

// ── Welcome message ─────────────────────────────────────────────────────────

(async function loadWelcome() {
  showLoading();
  try {
    const res  = await fetch('/welcome');
    const data = await res.json();
    hideLoading();
    addMessage(data.message, 'ai', data.time_ms + 'ms');
  } catch (err) {
    hideLoading();
    addMessage(
      'Hello! I can help you with BizFlow data — projects, invoices, AMC contracts, operations, and tickets. Ask me anything or pick a question below.\n\nI can also answer custom questions about your data — I\'ll show you my work before running anything.',
      'ai'
    );
  }
  input.focus();
})();
